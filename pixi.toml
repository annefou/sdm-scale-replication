# Single source of truth for the runtime — used by local dev, Docker, and CI.
# Add every dependency a notebook imports here. Local "kitchen-sink" envs
# (e.g. pangeo) hide missing deps; CI builds strictly from this file and will
# silently produce empty notebook cells if anything is missing.
#
# pixi.lock (committed alongside this file) pins every package to an exact
# build hash per platform. Regenerate it with `pixi install` after editing
# this file; commit both files in the same commit.

[workspace]
name = "sdm-scale-replication"
# bioconda hosts snakemake (and downstream rule-engine ecosystem); conda-forge
# is the priority channel for everything else.
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
# --- core scientific stack ---
numpy = "*"
pandas = ">=2.0"
xarray = ">=2024.6"
scipy = "*"
matplotlib = "*"
pyarrow = "*"
# --- notebook execution + Jupyter Book ---
jupytext = "*"
jupyterlab = "*"
nbclient = "*"
ipykernel = "*"
# --- pipeline driver ---
snakemake = "*"
# --- intermediate storage formats (NEVER .npz — DOMAIN.md) ---
netcdf4 = "*"
zarr = "*"
dask = "*"
# --- geographic I/O for IUCN/BirdLife range polygons ---
geopandas = "*"
shapely = "*"
pyproj = "*"
rasterio = "*"
fiona = "*"
# --- map plotting ---
cartopy = "*"
# --- HTTP for direct downloads ---
requests = "*"

[pypi-dependencies]
pygbif = "*"
# HEALPix on geographic data (NESTED, WGS84-aware) — DOMAIN.md mandate.
# Published on PyPI from github.com/GRID4EARTH/healpix-geo (Rust + maturin).
# Pinned >=0.1.2 — the CalVer 2026.5.1 release was yanked (wrong version scheme).
healpix-geo = ">=0.1.2"

[feature.docs.dependencies]
mystmd = "*"

[feature.tests.dependencies]
pytest = "*"

[environments]
default = { solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
tests = { features = ["tests"], solve-group = "default" }

[tasks]
run = "snakemake --cores 1"
book = "myst build --html"
lab = "jupyter lab"
